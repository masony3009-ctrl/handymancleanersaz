<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-label="Text conversation: a request comes in and a $200 quote goes right back">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0aa5a0"/>
      <stop offset="1" stop-color="#087f7b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="420" fill="url(#bg)"/>

  <!-- incoming message -->
  <g>
    <rect x="62" y="102" width="204" height="90" rx="24" fill="#ffffff"/>
    <path d="M84 190 L64 214 L104 190 Z" fill="#ffffff"/>
    <rect x="88" y="128" width="152" height="13" rx="6.5" fill="#b9c6cc"/>
    <rect x="88" y="154" width="106" height="13" rx="6.5" fill="#b9c6cc"/>
  </g>

  <!-- reply with the price -->
  <g>
    <rect x="148" y="226" width="212" height="92" rx="24" fill="#1e2a32"/>
    <path d="M338 316 L356 340 L318 316 Z" fill="#1e2a32"/>
    <text x="238" y="288" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#ffffff">$200</text>
    <circle cx="322" cy="272" r="20" fill="#0aa5a0"/>
    <path d="M312 272 L319 279 L333 264" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
