<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-label="Calendar with your turnover dates confirmed">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0aa5a0"/>
      <stop offset="1" stop-color="#087f7b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="420" fill="url(#bg)"/>

  <!-- calendar card -->
  <rect x="96" y="104" width="228" height="212" rx="18" fill="#ffffff"/>
  <path d="M96 122 a18 18 0 0 1 18 -18 h192 a18 18 0 0 1 18 18 v40 h-228 Z" fill="#1e2a32"/>
  <!-- binder rings -->
  <rect x="146" y="84" width="14" height="44" rx="7" fill="#ffffff"/>
  <rect x="260" y="84" width="14" height="44" rx="7" fill="#ffffff"/>

  <!-- date grid -->
  <g fill="#d3dde1">
    <circle cx="136" cy="192" r="11"/><circle cx="184" cy="192" r="11"/><circle cx="232" cy="192" r="11"/><circle cx="280" cy="192" r="11"/>
    <circle cx="136" cy="236" r="11"/><circle cx="280" cy="236" r="11"/>
    <circle cx="136" cy="280" r="11"/><circle cx="184" cy="280" r="11"/><circle cx="232" cy="280" r="11"/><circle cx="280" cy="280" r="11"/>
  </g>
  <!-- booked turnover days -->
  <circle cx="184" cy="236" r="13" fill="#0aa5a0"/>
  <circle cx="232" cy="236" r="13" fill="#0aa5a0"/>

  <!-- confirmed check -->
  <circle cx="296" cy="296" r="42" fill="#0aa5a0"/>
  <circle cx="296" cy="296" r="42" fill="none" stroke="#ffffff" stroke-width="6"/>
  <path d="M276 296 L290 310 L318 280" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
